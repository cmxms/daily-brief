name: daily-brief

# NOTE: posting to Substack CANNOT run from GitHub Actions — Substack's API is behind
# Cloudflare, which blocks datacenter IPs (the runner gets a 403 "Just a moment..."
# challenge, valid cookie or not). Run this tool LOCALLY on a schedule instead — see
# SETUP.md (register_task.ps1). The auto cron is therefore disabled; this workflow is
# left only as a manual gather+write preview (the post step still fails in the cloud).
on:
  workflow_dispatch: {}

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Gather + write + post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRADIER_API_KEY: ${{ secrets.TRADIER_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SUBSTACK_PUBLICATION_URL: ${{ secrets.SUBSTACK_PUBLICATION_URL }}
          # Cookie auth (works from datacenter IPs); email/password is the local fallback.
          SUBSTACK_COOKIES: ${{ secrets.SUBSTACK_COOKIES }}
          SUBSTACK_EMAIL: ${{ secrets.SUBSTACK_EMAIL }}
          SUBSTACK_PASSWORD: ${{ secrets.SUBSTACK_PASSWORD }}
          # Optional: BRIEF_MODEL to override the writer model.
        run: python run.py --post
      - name: Upload the brief as an artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brief
          path: out/
          if-no-files-found: ignore
