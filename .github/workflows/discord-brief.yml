name: discord-brief

# Fully autonomous: gather -> write (Claude + web search) -> post to Discord.
# Unlike the Substack path, Discord webhooks are NOT blocked from datacenter IPs, so this
# runs end-to-end in the cloud on a free schedule. Set DISCORD_WEBHOOK_URL (+ the three API
# keys) as repo Secrets. Trigger manually anytime via "Run workflow" (workflow_dispatch).

on:
  schedule:
    # 11:11 UTC = 7:11 AM ET during EDT (summer, UTC-4). Deliberately PRE-OPEN and early:
    # GitHub's scheduler is best-effort and can fire anywhere from a few minutes to a couple
    # of HOURS late under load (Fri 6/26 fired 2.5h late), so we run early to buffer against
    # that and still land before the 9:30 ET open. This runs BEFORE the 8:30 ET data releases,
    # so the brief PREVIEWS today's econ calendar rather than reporting actuals (see playbook).
    # Off the top-of-hour (:00/:30) on purpose — those minutes are the most contended/delayed.
    # Mon-Fri only; --skip-holidays no-ops market holidays. In EST (winter, UTC-5) 7:11 ET =
    # 12:11 UTC — change to "11 12 * * 1-5" when the US is on standard time.
    - cron: "11 11 * * 1-5"
  workflow_dispatch: {}

# Allow the job's GITHUB_TOKEN to commit the dated brief back to the repo.
permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Gather + write + post to Discord
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRADIER_API_KEY: ${{ secrets.TRADIER_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Optional: a 2nd server's webhook (e.g. a friend's). Set DISCORD_WEBHOOK_URLS as a repo
          # Secret (one URL, or several comma-separated). The brief fans out to all of them; a dead
          # webhook is skipped, not fatal. (You can also just put both URLs, comma-separated, in
          # DISCORD_WEBHOOK_URL itself and leave this unset.)
          DISCORD_WEBHOOK_URLS: ${{ secrets.DISCORD_WEBHOOK_URLS }}
          # Optional: BRIEF_MODEL to override the writer model.
        run: python run.py --discord --skip-holidays
      - name: Archive the brief to the repo (dated, permanent)
        if: success()
        run: |
          mkdir -p morning_briefs
          shopt -s nullglob
          archived=0
          for f in out/*.brief.md; do
            base="$(basename "$f" .brief.md)"        # YYYY-MM-DD
            cp "$f" "morning_briefs/${base}-community.md"
            archived=1
          done
          if [ "$archived" = 1 ] && [ -n "$(git status --porcelain morning_briefs)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add morning_briefs
            git commit -m "brief: archive $(date -u +%F)"
            git push
          else
            echo "no new brief to archive (non-trading day or already archived)"
          fi
      - name: Upload the brief as an artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brief
          path: out/
          if-no-files-found: ignore
